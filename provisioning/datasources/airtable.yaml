apiVersion: 1

# Auto-provisioned Airtable datasource for the root docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# Create a personal access token at https://airtable.com/create/tokens with the
# scopes data.records:read and schema.bases:read, then run:
#   AIRTABLE_API_TOKEN=pat... AIRTABLE_BASE_ID=appXXXX docker compose up
# Leave the variables empty to add the datasource manually instead.
datasources:
  - name: Airtable
    type: yesoreyeram-airtable-datasource
    access: proxy
    jsonData:
      baseURL: $AIRTABLE_API_URL
      baseId: $AIRTABLE_BASE_ID
    secureJsonData:
      apiToken: $AIRTABLE_API_TOKEN
    editable: true
