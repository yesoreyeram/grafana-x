apiVersion: 1

# Auto-provisioned Baserow datasource for the root docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# Create a database/table and a database token in the Baserow UI first
# (http://localhost:8980). Leave the variables empty to add it manually instead.
datasources:
  - name: Baserow
    type: yesoreyeram-baserow-datasource
    access: proxy
    jsonData:
      platform: selfhosted
      baseURL: $GRAFANA_INTERNAL_BASEROW_URL
      authMode: $BASEROW_AUTH_MODE
      databaseId: $BASEROW_DATABASE_ID
      email: $BASEROW_EMAIL
    secureJsonData:
      apiToken: $BASEROW_API_TOKEN
      password: $BASEROW_PASSWORD
    editable: true
