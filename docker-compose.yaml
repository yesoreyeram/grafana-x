# Root-level Docker stack: runs a single Grafana with EVERY plugin in this
# monorepo mounted, plus the backing services each plugin needs for a live demo.
#
# Prerequisites — build each plugin's dist/ first (frontend + backend):
#
#   # NocoDB plugin
#   yarn workspace @yesoreyeram/grafana-nocodb-datasource build
#   (cd plugins/datasources/yesoreyeram-nocodb-datasource && mage -v build:linux)   # or your arch
#
#   # Notion plugin
#   yarn workspace @yesoreyeram/grafana-notion-datasource build
#   (cd plugins/datasources/yesoreyeram-notion-datasource && mage -v build:linux)   # or your arch
#
#   # Baserow plugin
#   yarn workspace @yesoreyeram/grafana-baserow-datasource build
#   (cd plugins/datasources/yesoreyeram-baserow-datasource && mage -v build:linux)  # or your arch
#
# Then start everything:
#
#   NOTION_API_TOKEN=secret_... HUBSPOT_ACCESS_TOKEN=pat-... BASEROW_API_TOKEN=... BASEROW_DATABASE_ID=1 docker compose up
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).
# NocoDB runs at http://localhost:8080 (seeded with sample data).
# Baserow runs at http://localhost:8980 (empty; create your own database/table/token in the UI).
# The NocoDB datasource is auto-provisioned by its seed job; the Notion and
# Baserow datasources are auto-provisioned from env vars (omit them to skip).
# Baserow auth (all optional): token mode -> BASEROW_API_TOKEN + BASEROW_DATABASE_ID;
# password mode -> BASEROW_AUTH_MODE=password BASEROW_EMAIL=... BASEROW_PASSWORD=...

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      # Each plugin's built dist/ is mounted under Grafana's plugins directory.
      - ./plugins/datasources/yesoreyeram-nocodb-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-nocodb-datasource
      - ./plugins/datasources/yesoreyeram-notion-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-notion-datasource
      - ./plugins/datasources/yesoreyeram-baserow-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-baserow-datasource
      - ./plugins/datasources/yesoreyeram-linear-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-linear-datasource
      - ./plugins/datasources/yesoreyeram-clickup-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-clickup-datasource
      - ./plugins/datasources/yesoreyeram-airtable-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-airtable-datasource
      - ./plugins/datasources/yesoreyeram-appwrite-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-appwrite-datasource
      - ./plugins/datasources/yesoreyeram-plane-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-plane-datasource
      - ./plugins/datasources/yesoreyeram-monday-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-monday-datasource
      - ./plugins/datasources/yesoreyeram-hubspot-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-hubspot-datasource
      - ./plugins/datasources/yesoreyeram-pocketbase-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-pocketbase-datasource
      - ./plugins/datasources/yesoreyeram-asana-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-asana-datasource
      - ./plugins/panel/yesoreyeram-vizard-panel/dist:/var/lib/grafana/plugins/yesoreyeram-vizard-panel
      # Static provisioning shared by the stack (this repo's provisioning/ dir).
      # The NocoDB seed job also drops a generated datasource (with a fresh
      # token) into provisioning/datasources, alongside the static Notion one.
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      # Allow every unsigned plugin in this monorepo.
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-nocodb-datasource,yesoreyeram-notion-datasource,yesoreyeram-baserow-datasource,yesoreyeram-linear-datasource,yesoreyeram-clickup-datasource,yesoreyeram-airtable-datasource,yesoreyeram-appwrite-datasource,yesoreyeram-plane-datasource,yesoreyeram-monday-datasource,yesoreyeram-hubspot-datasource,yesoreyeram-pocketbase-datasource,yesoreyeram-asana-datasource,yesoreyeram-vizard-panel
      # Preinstall the signed Infinity datasource (used by the Vizard demos).
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
      # Anonymous access with admin role so no login is required locally.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # Notion datasource provisioning reads the integration token from here.
      # Create an internal integration at https://www.notion.so/my-integrations,
      # share a database with it, then run:
      #   NOTION_API_TOKEN=secret_... docker compose up
      - NOTION_API_TOKEN=${NOTION_API_TOKEN:-}
      # ClickUp datasource provisioning reads the personal token from here.
      # Generate a token at ClickUp Settings > Apps > API Token, then run:
      #   CLICKUP_API_TOKEN=pk_... docker compose up
      - CLICKUP_API_TOKEN=${CLICKUP_API_TOKEN:-}
      # Airtable datasource provisioning reads the personal access token from here.
      # Create a token at https://airtable.com/create/tokens with the scopes
      # data.records:read and schema.bases:read, then run:
      #   AIRTABLE_API_TOKEN=pat... AIRTABLE_BASE_ID=appXXXX docker compose up
      - AIRTABLE_API_URL=${AIRTABLE_API_URL:-https://api.airtable.com}
      - AIRTABLE_API_TOKEN=${AIRTABLE_API_TOKEN:-}
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID:-}
      # Appwrite datasource provisioning reads credentials from these.
      # Create an API key in the Appwrite console (Overview > Integrations > API
      # keys) with the scopes databases.read, collections.read, attributes.read
      # and documents.read, then run:
      #   APPWRITE_PROJECT_ID=... APPWRITE_API_KEY=... APPWRITE_DATABASE_ID=... docker compose up
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-https://cloud.appwrite.io/v1}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:-}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY:-}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-}
      # Plane datasource provisioning reads the API key and workspace slug from here.
      # Generate a key at Plane Profile Settings > Personal Access Tokens, then run:
      #   PLANE_API_KEY=plane_api_... PLANE_WORKSPACE_SLUG=my-team docker compose up
      - PLANE_API_KEY=${PLANE_API_KEY:-}
      - PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG:-}
      # monday.com datasource provisioning reads the personal API token from here.
      # Copy your token from avatar menu > Developers > My Access Tokens, then run:
      #   MONDAY_API_TOKEN=... docker compose up
      - MONDAY_API_TOKEN=${MONDAY_API_TOKEN:-}
      # HubSpot datasource provisioning reads the private app access token from here.
      # Create a private app at Settings > Integrations > Private Apps with at minimum
      # crm.objects.owners.read (for health check) plus scopes for the objects you query.
      # Then run:
      #   HUBSPOT_ACCESS_TOKEN=pat-xxxxx docker compose up
      - HUBSPOT_ACCESS_TOKEN=${HUBSPOT_ACCESS_TOKEN:-}
      # Baserow datasource provisioning (all optional). Create a database/table
      # and a database token in the Baserow UI at http://localhost:8980 first.
      - GRAFANA_INTERNAL_BASEROW_URL=${GRAFANA_INTERNAL_BASEROW_URL:-http://baserow}
      - BASEROW_AUTH_MODE=${BASEROW_AUTH_MODE:-token}
      - BASEROW_DATABASE_ID=${BASEROW_DATABASE_ID:-}
      - BASEROW_API_TOKEN=${BASEROW_API_TOKEN:-}
      - BASEROW_EMAIL=${BASEROW_EMAIL:-}
      - BASEROW_PASSWORD=${BASEROW_PASSWORD:-}
      # PocketBase datasource provisioning. The stack runs a real PocketBase
      # (seeded with demo/metrics collections) with superuser auth.
      - POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
      - POCKETBASE_AUTH_MODE=${POCKETBASE_AUTH_MODE:-superuser}
      - POCKETBASE_IDENTITY=${POCKETBASE_IDENTITY:-admin@example.com}
      - POCKETBASE_AUTH_COLLECTION=${POCKETBASE_AUTH_COLLECTION:-}
      - POCKETBASE_PASSWORD=${POCKETBASE_PASSWORD:-Password123!}
      - POCKETBASE_AUTH_TOKEN=${POCKETBASE_AUTH_TOKEN:-}
      # Asana datasource provisioning reads the personal access token from here.
      # Create a token at My Settings > Apps > Developer apps, then run:
      #   ASANA_API_TOKEN=1/123:abc... docker compose up
      - ASANA_API_TOKEN=${ASANA_API_TOKEN:-}
    depends_on:
      nocodb-seed:
        condition: service_completed_successfully
      baserow:
        condition: service_healthy
      pocketbase:
        condition: service_healthy
      pocketbase-seed:
        condition: service_completed_successfully

  # --- NocoDB plugin backing services ---------------------------------------

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8080:8080/tcp"
    volumes:
      - nocodb_data:/usr/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  # One-shot job that seeds NocoDB with sample data and generates the Grafana
  # datasource provisioning file (including a fresh API token).
  nocodb-seed:
    image: node:20-alpine
    working_dir: /seed
    volumes:
      - ./plugins/datasources/yesoreyeram-nocodb-datasource/scripts:/seed:ro
      # Generated NocoDB datasource lands in the same provisioning dir Grafana reads.
      - ./provisioning/datasources:/provisioning/datasources
    environment:
      - NOCODB_URL=http://nocodb:8080
      - GRAFANA_INTERNAL_NOCODB_URL=http://nocodb:8080
      - DS_OUTPUT=/provisioning/datasources/nocodb.generated.yaml
    command: ["node", "/seed/seed.mjs"]
    depends_on:
      nocodb:
        condition: service_healthy
    restart: "no"

  # --- Baserow plugin backing services --------------------------------------

  baserow:
    image: baserow/baserow:1.34.5
    ports:
      - "8980:80/tcp"
    environment:
      - BASEROW_PUBLIC_URL=http://localhost:8980
      # Grafana reaches Baserow at the internal host `http://baserow`. Register
      # it so the all-in-one Caddy routes /api/* to the backend (otherwise that
      # host is treated as a published app-builder domain -> "Site not found").
      - BASEROW_EXTRA_PUBLIC_URLS=http://baserow
      # Baserow imports ~120 example templates on first migration, which can add
      # several minutes to the initial boot. Disable it for a fast local start.
      - BASEROW_TRIGGER_SYNC_TEMPLATES_AFTER_MIGRATION=false
      # Skip the periodic background template sync as well.
      - BASEROW_SYNC_TEMPLATES_ON_STARTUP=false
    volumes:
      - baserow_data:/baserow/data
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost/api/_health/"]
      interval: 5s
      timeout: 5s
      retries: 60

  # --- PocketBase plugin backing services -----------------------------------

  # PocketBase: upsert a superuser on boot, then serve. Single binary, single
  # SQLite-backed data dir (persisted in a named volume).
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:${POCKETBASE_VERSION:-latest}
    entrypoint:
      - /bin/sh
      - -c
      - |
        pocketbase superuser upsert "$$PB_SUPERUSER_EMAIL" "$$PB_SUPERUSER_PASSWORD" --dir=/pb_data || true
        exec pocketbase serve --http=0.0.0.0:8090 --dir=/pb_data
    environment:
      - PB_SUPERUSER_EMAIL=${POCKETBASE_IDENTITY:-admin@example.com}
      - PB_SUPERUSER_PASSWORD=${POCKETBASE_PASSWORD:-Password123!}
    ports:
      - "8090:8090/tcp"
    volumes:
      - pocketbase_data:/pb_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8090/api/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  # One-shot job that seeds PocketBase with sample collections and records.
  pocketbase-seed:
    image: node:20-alpine
    working_dir: /seed
    volumes:
      - ./plugins/datasources/yesoreyeram-pocketbase-datasource/scripts:/seed:ro
    environment:
      - POCKETBASE_INTERNAL_URL=http://pocketbase:8090
      - POCKETBASE_IDENTITY=${POCKETBASE_IDENTITY:-admin@example.com}
      - POCKETBASE_PASSWORD=${POCKETBASE_PASSWORD:-Password123!}
    command: ["node", "/seed/seed.mjs"]
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: "no"

volumes:
  nocodb_data:
  baserow_data:
  pocketbase_data:
