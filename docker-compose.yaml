# Root-level Docker stack: runs a single Grafana with EVERY plugin in this
# monorepo mounted, plus the backing services each plugin needs for a live demo.
#
# Prerequisites — build each plugin's dist/ first (frontend + backend):
#
#   # NocoDB plugin
#   yarn workspace yesoreyeram-nocodb-datasource build
#   (cd plugins/grafana-nocodb-datasource && mage -v build:linux)   # or your arch
#
#   # Notion plugin
#   yarn workspace yesoreyeram-notion-datasource build
#   (cd plugins/grafana-notion-datasource && mage -v build:linux)   # or your arch
#
#   # Baserow plugin
#   yarn workspace yesoreyeram-baserow-datasource build
#   (cd plugins/grafana-baserow-datasource && mage -v build:linux)  # or your arch
#
# Then start everything:
#
#   NOTION_API_TOKEN=secret_... BASEROW_API_TOKEN=... BASEROW_DATABASE_ID=1 docker compose up
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).
# NocoDB runs at http://localhost:8080 (seeded with sample data).
# Baserow runs at http://localhost:8980 (empty; create your own database/table/token in the UI).
# The NocoDB datasource is auto-provisioned by its seed job; the Notion and
# Baserow datasources are auto-provisioned from env vars (omit them to skip).
# Baserow auth (all optional): token mode -> BASEROW_API_TOKEN + BASEROW_DATABASE_ID;
# password mode -> BASEROW_AUTH_MODE=password BASEROW_EMAIL=... BASEROW_PASSWORD=...

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      # Each plugin's built dist/ is mounted under Grafana's plugins directory.
      - ./plugins/grafana-nocodb-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-nocodb-datasource
      - ./plugins/grafana-notion-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-notion-datasource
      - ./plugins/grafana-baserow-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-baserow-datasource
      - ./plugins/grafana-linear-datasource/dist:/var/lib/grafana/plugins/yesoreyeram-linear-datasource
      # Static provisioning shared by the stack (this repo's provisioning/ dir).
      # The NocoDB seed job also drops a generated datasource (with a fresh
      # token) into provisioning/datasources, alongside the static Notion one.
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      # Allow every unsigned plugin in this monorepo.
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-nocodb-datasource,yesoreyeram-notion-datasource,yesoreyeram-baserow-datasource
      # Anonymous access with admin role so no login is required locally.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # Notion datasource provisioning reads the integration token from here.
      # Create an internal integration at https://www.notion.so/my-integrations,
      # share a database with it, then run:
      #   NOTION_API_TOKEN=secret_... docker compose up
      - NOTION_API_TOKEN=${NOTION_API_TOKEN:-}
      # Baserow datasource provisioning (all optional). Create a database/table
      # and a database token in the Baserow UI at http://localhost:8980 first.
      - GRAFANA_INTERNAL_BASEROW_URL=${GRAFANA_INTERNAL_BASEROW_URL:-http://baserow}
      - BASEROW_AUTH_MODE=${BASEROW_AUTH_MODE:-token}
      - BASEROW_DATABASE_ID=${BASEROW_DATABASE_ID:-}
      - BASEROW_API_TOKEN=${BASEROW_API_TOKEN:-}
      - BASEROW_EMAIL=${BASEROW_EMAIL:-}
      - BASEROW_PASSWORD=${BASEROW_PASSWORD:-}
    depends_on:
      nocodb-seed:
        condition: service_completed_successfully
      baserow:
        condition: service_healthy

  # --- NocoDB plugin backing services ---------------------------------------

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8080:8080/tcp"
    volumes:
      - nocodb_data:/usr/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  # One-shot job that seeds NocoDB with sample data and generates the Grafana
  # datasource provisioning file (including a fresh API token).
  nocodb-seed:
    image: node:20-alpine
    working_dir: /seed
    volumes:
      - ./plugins/grafana-nocodb-datasource/scripts:/seed:ro
      # Generated NocoDB datasource lands in the same provisioning dir Grafana reads.
      - ./provisioning/datasources:/provisioning/datasources
    environment:
      - NOCODB_URL=http://nocodb:8080
      - GRAFANA_INTERNAL_NOCODB_URL=http://nocodb:8080
      - DS_OUTPUT=/provisioning/datasources/nocodb.generated.yaml
    command: ["node", "/seed/seed.mjs"]
    depends_on:
      nocodb:
        condition: service_healthy
    restart: "no"

  # --- Baserow plugin backing services --------------------------------------

  baserow:
    image: baserow/baserow:1.34.5
    ports:
      - "8980:80/tcp"
    environment:
      - BASEROW_PUBLIC_URL=http://localhost:8980
      # Grafana reaches Baserow at the internal host `http://baserow`. Register
      # it so the all-in-one Caddy routes /api/* to the backend (otherwise that
      # host is treated as a published app-builder domain -> "Site not found").
      - BASEROW_EXTRA_PUBLIC_URLS=http://baserow
      # Baserow imports ~120 example templates on first migration, which can add
      # several minutes to the initial boot. Disable it for a fast local start.
      - BASEROW_TRIGGER_SYNC_TEMPLATES_AFTER_MIGRATION=false
      # Skip the periodic background template sync as well.
      - BASEROW_SYNC_TEMPLATES_ON_STARTUP=false
    volumes:
      - baserow_data:/baserow/data
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost/api/_health/"]
      interval: 5s
      timeout: 5s
      retries: 60

volumes:
  nocodb_data:
  baserow_data:
