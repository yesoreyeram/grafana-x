apiVersion: 1

# Auto-provisioned Appwrite datasource for the local docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# If APPWRITE_API_KEY is empty, configure the datasource in the UI instead.
datasources:
  - name: Appwrite
    type: yesoreyeram-appwrite-datasource
    access: proxy
    isDefault: true
    jsonData:
      endpoint: $APPWRITE_ENDPOINT
      projectId: $APPWRITE_PROJECT_ID
      databaseId: $APPWRITE_DATABASE_ID
    secureJsonData:
      apiKey: $APPWRITE_API_KEY
    editable: true
