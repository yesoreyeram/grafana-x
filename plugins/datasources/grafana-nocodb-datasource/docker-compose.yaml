services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-nocodb-datasource
      - ./provisioning:/etc/grafana/provisioning
      # The datasource is generated by the seed job (with a fresh API token) into
      # this named volume, which Grafana reads for datasource provisioning.
      - grafana_datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-nocodb-datasource
      # Anonymous access with admin role so no login is required locally.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
    depends_on:
      nocodb-seed:
        condition: service_completed_successfully

  nocodb:
    image: nocodb/nocodb:latest
    ports:
      - "8080:8080/tcp"
    volumes:
      - nocodb_data:/usr/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 5s
      retries: 30

  # One-shot job that seeds NocoDB with sample data and generates the Grafana
  # datasource provisioning file (including a fresh API token).
  nocodb-seed:
    image: node:20-alpine
    working_dir: /seed
    volumes:
      - ./scripts:/seed:ro
      - grafana_datasources:/provisioning/datasources
    environment:
      - NOCODB_URL=http://nocodb:8080
      - GRAFANA_INTERNAL_NOCODB_URL=http://nocodb:8080
      - DS_OUTPUT=/provisioning/datasources/nocodb.generated.yaml
    command: ["node", "/seed/seed.mjs"]
    depends_on:
      nocodb:
        condition: service_healthy
    restart: "no"

volumes:
  nocodb_data:
  grafana_datasources:
