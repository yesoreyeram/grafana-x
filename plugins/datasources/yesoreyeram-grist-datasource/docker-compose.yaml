version: "3.8"

services:
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_INSTALL_PLUGINS=
      - GRIST_API_KEY=${GRIST_API_KEY:-}
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-grist-datasource
      - ./provisioning:/etc/grafana/provisioning
