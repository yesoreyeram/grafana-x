# Local stack for the Attio data source plugin: a single Grafana with the built
# plugin mounted and the datasource auto-provisioned against the Attio API. Attio
# is hosted SaaS, so there is no local backing service to run.
#
# Prerequisites — build the plugin's dist/ first (frontend + backend):
#
#   yarn build                  # frontend + backend (all platforms)
#   # or: yarn build:frontend && mage -v build:linux
#
# Then start Grafana with your Attio access token:
#
#   ATTIO_API_TOKEN=your-token docker compose up
#
# Create a token in Attio under Settings > Developers > API keys.
# Omit the variable to skip auto-provisioning and add the datasource in the UI.
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-attio-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-attio-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # Attio datasource provisioning reads credentials from these.
      - ATTIO_BASE_URL=${ATTIO_BASE_URL:-https://api.attio.com}
      - ATTIO_API_TOKEN=${ATTIO_API_TOKEN:-}
