apiVersion: 1

# Auto-provisioned Attio datasource for the local docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# If ATTIO_API_TOKEN is empty, configure the datasource in the UI instead.
datasources:
  - name: Attio
    type: yesoreyeram-attio-datasource
    access: proxy
    isDefault: true
    jsonData:
      # Attio is hosted SaaS; the base URL defaults to https://api.attio.com.
      # Override only to point at a proxy.
      baseURL: ${ATTIO_BASE_URL:-https://api.attio.com}
    secureJsonData:
      apiToken: $ATTIO_API_TOKEN
    editable: true
