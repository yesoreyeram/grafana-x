# Local stack for the Coda data source plugin: a single Grafana with the
# built plugin mounted and the datasource auto-provisioned against Coda's
# hosted API (https://coda.io/apis/v1). Coda is SaaS-only, so there is no
# local backing service to run.
#
# Prerequisites — build the plugin's dist/ first (frontend + backend):
#
#   yarn build                  # frontend + backend (all platforms)
#
# Then start Grafana with your Coda API token:
#
#   CODA_API_TOKEN=tok... CODA_DOC_ID=doc... docker compose up
#
# Get a token at https://coda.io/account.
# Omit the variables to skip auto-provisioning and add the datasource in the UI.
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-coda-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-coda-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      - CODA_API_TOKEN=${CODA_API_TOKEN:-}
      - CODA_DOC_ID=${CODA_DOC_ID:-}
