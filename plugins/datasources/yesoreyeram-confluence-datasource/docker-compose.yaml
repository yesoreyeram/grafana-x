services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-confluence-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-confluence-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      - CONFLUENCE_URL=${CONFLUENCE_URL:-}
      - CONFLUENCE_AUTH_MODE=${CONFLUENCE_AUTH_MODE:-basic}
      - CONFLUENCE_EMAIL=${CONFLUENCE_EMAIL:-}
      - CONFLUENCE_API_TOKEN=${CONFLUENCE_API_TOKEN:-}
    # Usage:
    #   1. Build the plugin (yarn build)
    #   2. Create a Cloud API token at
    #      https://id.atlassian.com/manage-profile/security/api-tokens
    #   3. Basic auth:
    #        CONFLUENCE_URL=https://your-site.atlassian.net/wiki \
    #        CONFLUENCE_AUTH_MODE=basic \
    #        CONFLUENCE_EMAIL=you@example.com \
    #        CONFLUENCE_API_TOKEN=xxxx docker compose up
    #      Bearer auth:
    #        CONFLUENCE_URL=https://your-site.atlassian.net/wiki \
    #        CONFLUENCE_AUTH_MODE=bearer \
    #        CONFLUENCE_API_TOKEN=<oauth-or-pat> docker compose up
    #   4. Open http://localhost:3000
