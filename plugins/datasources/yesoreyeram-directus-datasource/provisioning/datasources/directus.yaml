apiVersion: 1

# Auto-provisioned Directus datasource for the local docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# If DIRECTUS_URL or DIRECTUS_API_TOKEN are empty, configure the datasource in
# the UI instead.
datasources:
  - name: Directus
    type: yesoreyeram-directus-datasource
    access: proxy
    isDefault: true
    jsonData:
      baseURL: $DIRECTUS_URL
    secureJsonData:
      apiToken: $DIRECTUS_API_TOKEN
    editable: true
