services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-intercom-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-intercom-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      - INTERCOM_API_TOKEN=${INTERCOM_API_TOKEN:-}
      - INTERCOM_BASE_URL=${INTERCOM_BASE_URL:-https://api.intercom.io}
      - INTERCOM_VERSION=${INTERCOM_VERSION:-2.11}
    # Usage:
    #   1. Build the plugin (yarn build)
    #   2. Create an access token in the Intercom Developer Hub (or app settings).
    #   3. INTERCOM_API_TOKEN=dG9rZW46... docker compose up
    #      (optionally set INTERCOM_BASE_URL for EU/AU, INTERCOM_VERSION to pin a version)
    #   4. Open http://localhost:3000
