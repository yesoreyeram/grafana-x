services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-pipedrive-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-pipedrive-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      - PIPEDRIVE_COMPANY_DOMAIN=${PIPEDRIVE_COMPANY_DOMAIN:-}
      - PIPEDRIVE_API_TOKEN=${PIPEDRIVE_API_TOKEN:-}
      - PIPEDRIVE_OAUTH_TOKEN=${PIPEDRIVE_OAUTH_TOKEN:-}
    # Usage:
    #   1. Build the plugin (yarn build)
    #   2. Get your Pipedrive API token from Settings > Personal preferences > API
    #      (or an OAuth2 access token), and your company subdomain.
    #   3. PIPEDRIVE_COMPANY_DOMAIN=mycompany PIPEDRIVE_API_TOKEN=xxxxxxx docker compose up
    #   4. Open http://localhost:3000
