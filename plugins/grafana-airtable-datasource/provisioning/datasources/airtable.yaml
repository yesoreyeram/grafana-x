apiVersion: 1

# Auto-provisioned Airtable datasource for the local docker-compose stack.
# Credentials come from environment variables (see docker-compose.yaml header).
# If AIRTABLE_API_TOKEN is empty, configure the datasource in the UI instead.
datasources:
  - name: Airtable
    type: yesoreyeram-airtable-datasource
    access: proxy
    isDefault: true
    jsonData:
      baseURL: $AIRTABLE_API_URL
      baseId: $AIRTABLE_BASE_ID
    secureJsonData:
      apiToken: $AIRTABLE_API_TOKEN
    editable: true
