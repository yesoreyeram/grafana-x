# Local stack for the Airtable data source plugin: a single Grafana with the
# built plugin mounted and the datasource auto-provisioned against Airtable's
# hosted API (https://api.airtable.com). Airtable is SaaS-only, so there is no
# local backing service to run.
#
# Prerequisites — build the plugin's dist/ first (frontend + backend):
#
#   yarn build                  # frontend + backend (all platforms)
#   # or: yarn build:frontend && mage -v build:linux
#
# Then start Grafana with your Airtable personal access token:
#
#   AIRTABLE_API_TOKEN=pat... AIRTABLE_BASE_ID=appXXXX docker compose up
#
# Create a token at https://airtable.com/create/tokens with the scopes
# data.records:read and schema.bases:read, and grant it access to your base(s).
# Omit the variables to skip auto-provisioning and add the datasource in the UI.
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-airtable-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-airtable-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # Airtable datasource provisioning reads credentials from these.
      - AIRTABLE_API_URL=${AIRTABLE_API_URL:-https://api.airtable.com}
      - AIRTABLE_API_TOKEN=${AIRTABLE_API_TOKEN:-}
      - AIRTABLE_BASE_ID=${AIRTABLE_BASE_ID:-}
