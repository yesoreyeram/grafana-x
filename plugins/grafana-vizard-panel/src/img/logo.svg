<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Vizard">
  <defs>
    <linearGradient id="vz-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F15B2A"/>
      <stop offset="1" stop-color="#FBC417"/>
    </linearGradient>
    <linearGradient id="vz-wand" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3865AB"/>
      <stop offset="1" stop-color="#6CA0F5"/>
    </linearGradient>
    <linearGradient id="vz-star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCEE1F"/>
      <stop offset="1" stop-color="#F15B2A"/>
    </linearGradient>
  </defs>
  <!-- chart: three ascending bars in the Grafana orange -> amber gradient -->
  <g fill="url(#vz-bar)">
    <rect x="7" y="37" width="10" height="17" rx="3"/>
    <rect x="20" y="29" width="10" height="25" rx="3"/>
    <rect x="33" y="21" width="10" height="33" rx="3"/>
  </g>
  <!-- magic wand -->
  <line x1="27" y1="48.5" x2="46.5" y2="21" stroke="url(#vz-wand)" stroke-width="5" stroke-linecap="round"/>
  <!-- sparkles at the wand tip -->
  <path d="M50,8 L51.7,14.3 L58,16 L51.7,17.7 L50,24 L48.3,17.7 L42,16 L48.3,14.3 Z" fill="url(#vz-star)"/>
  <circle cx="50" cy="16" r="1.7" fill="#fff"/>
  <path d="M39.5,7.2 L40.17,9.33 L42.3,10 L40.17,10.67 L39.5,12.8 L38.83,10.67 L36.7,10 L38.83,9.33 Z" fill="url(#vz-star)"/>
</svg>
