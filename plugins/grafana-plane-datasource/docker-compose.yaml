services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-plane-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-plane-datasource
      # Anonymous access with admin role so no login is required locally.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # The provisioned datasource reads the API key and workspace slug from these
      # env vars. Generate a key at Profile Settings > Personal Access Tokens,
      # then run:
      #   PLANE_API_KEY=plane_api_... PLANE_WORKSPACE_SLUG=my-team docker compose up
      - PLANE_API_KEY=${PLANE_API_KEY:-}
      - PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG:-}
