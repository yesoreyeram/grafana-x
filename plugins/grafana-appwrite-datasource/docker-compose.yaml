# Local stack for the Appwrite data source plugin: a single Grafana with the
# built plugin mounted and the datasource auto-provisioned against Appwrite's
# hosted API (https://cloud.appwrite.io/v1). Appwrite Cloud is SaaS, so there is
# no local backing service to run (point the endpoint at a self-hosted Appwrite
# if you have one).
#
# Prerequisites — build the plugin's dist/ first (frontend + backend):
#
#   yarn build                  # frontend + backend (all platforms)
#   # or: yarn build:frontend && mage -v build:linux
#
# Then start Grafana with your Appwrite project id and API key:
#
#   APPWRITE_PROJECT_ID=... APPWRITE_API_KEY=... APPWRITE_DATABASE_ID=... docker compose up
#
# Create an API key in the Appwrite console (Overview > Integrations > API keys)
# with the scopes databases.read, collections.read, attributes.read and
# documents.read. Omit the variables to skip auto-provisioning and add the
# datasource in the UI.
#
# Grafana runs with anonymous admin at http://localhost:3000 (no login).

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.3.0}
    ports:
      - "3000:3000/tcp"
    volumes:
      - ./dist:/var/lib/grafana/plugins/yesoreyeram-appwrite-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - GF_DEFAULT_APP_MODE=development
      - GF_LOG_LEVEL=debug
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=yesoreyeram-appwrite-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_USERS_DEFAULT_THEME=dark
      # Appwrite datasource provisioning reads credentials from these.
      - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-https://cloud.appwrite.io/v1}
      - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:-}
      - APPWRITE_API_KEY=${APPWRITE_API_KEY:-}
      - APPWRITE_DATABASE_ID=${APPWRITE_DATABASE_ID:-}
